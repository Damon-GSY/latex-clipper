<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>LaTeX Copy Helper 测试</title>
  <style>
    body { padding: 40px; font-family: system-ui, sans-serif; }
    .formula { font-size: 24px; padding: 20px; background: #f5f5f5; border-radius: 8px; display: inline-block; margin: 10px; }
  </style>
</head>
<body>
  <h1>LaTeX Copy Helper 测试页面</h1>

  <h2>测试公式</h2>

  <div class="MathJax formula" data-latex="E = mc^2">
    E = mc²
  </div>

  <div class="MathJax formula" data-latex="\int_0^\infty e^{-x^2} dx = \frac{\sqrt{\pi}}{2}">
    ∫₀^∞ e^(-x²) dx = √π/2
  </div>

  <h2>预期行为</h2>
  <ol>
    <li>鼠标悬停在公式上 → 出现蓝色"复制 LaTeX"按钮</li>
    <li>点击按钮 → 按钮变成绿色"已复制 ✓"</li>
    <li><strong>0.8 秒后按钮自动消失</strong></li>
    <li>如果鼠标离开，0.5 秒后按钮消失</li>
  </ol>

  <h2>调试信息</h2>
  <p>打开浏览器控制台 (F12 → Console) 查看日志</p>
  <p>你应该看到: <code>[LaTeX Clipper] v1.5.0 已加载</code></p>

  <script src="content.js"></script>
</body>
</html>
